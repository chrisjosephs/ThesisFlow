services:

  postgres:
    image: postgres:16
    container_name: thesisflow_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-thesisflow}
      - POSTGRES_USER=${POSTGRES_SUPERUSER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD}
      - THESISFLOW_MIGRATOR_PASSWORD
      - THESISFLOW_APP_PASSWORD
      - THESISFLOW_READONLY_PASSWORD
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init/01_roles.sh:/docker-entrypoint-initdb.d/01_roles.sh
      - ./database/schema.sql:/docker-entrypoint-initdb.d/02_schema.sql
      - ./database/init/03_grants.sql:/docker-entrypoint-initdb.d/03_grants.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d ${POSTGRES_DB:-thesisflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thesisflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — only starts with: docker compose --profile tools up
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: thesisflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
